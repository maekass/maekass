name: Generate Pearl Divider Animation

on:
  push:
    paths:
      - "assets/pearl-divider-animated.svg"
      - "assets/pearl-divider-dark.svg"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output
        run: |
          mkdir -p dist
          cp assets/pearl-divider-animated.svg dist/pearl-divider.svg
          cp assets/pearl-divider-dark.svg dist/pearl-divider-dark.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
