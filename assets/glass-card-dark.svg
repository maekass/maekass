<svg width="700" height="180" viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- glassmorphism: frosted glass for dark mode -->
    <linearGradient id="glass-bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2E3A;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#4A3650;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#2E2636;stop-opacity:0.6" />
    </linearGradient>
    <!-- neumorphic outer shadow for dark -->
    <filter id="glass-shadow-dark" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A1221" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#4A3650" flood-opacity="0.2" />
    </filter>
    <!-- inner light refraction line -->
    <linearGradient id="glass-edge-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D6CADD;stop-opacity:0.0" />
      <stop offset="30%" style="stop-color:#D6CADD;stop-opacity:0.25" />
      <stop offset="70%" style="stop-color:#D6CADD;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#D6CADD;stop-opacity:0.0" />
    </linearGradient>
  </defs>
  <!-- card body — frosted glass dark -->
  <rect x="20" y="15" width="660" height="150" rx="18" ry="18"
        fill="url(#glass-bg-dark)" filter="url(#glass-shadow-dark)"
        stroke="#D6CADD" stroke-width="0.5" stroke-opacity="0.3" />
  <!-- top highlight edge — light refraction -->
  <line x1="60" y1="16" x2="640" y2="16" stroke="url(#glass-edge-dark)" stroke-width="1" />
  <!-- title -->
  <text x="350" y="62" font-family="'Bodoni MT', Didot, 'Times New Roman', serif" font-size="28" font-weight="300" fill="#F0EEE9" text-anchor="middle" letter-spacing="2">Lacuna</text>
  <!-- subtitle -->
  <text x="350" y="88" font-family="'Bodoni MT', Didot, 'Times New Roman', serif" font-size="11" fill="#D6CADD" text-anchor="middle" letter-spacing="1.5">QUANTITATIVE M&amp;A INTELLIGENCE</text>
  <!-- tech stack -->
  <text x="350" y="115" font-family="'Bodoni MT', Didot, 'Times New Roman', serif" font-size="10" fill="#C4B1C9" text-anchor="middle" letter-spacing="1">Next.js 16 · React 19 · D3.js · TensorFlow.js</text>
  <!-- description -->
  <text x="350" y="142" font-family="'Bodoni MT', Didot, 'Times New Roman', serif" font-size="10" fill="#D6CADD" text-anchor="middle" opacity="0.85">Force-directed network graphs · exit pattern analytics · ML-driven deal scoring</text>
</svg>
