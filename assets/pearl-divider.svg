<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 50" width="600" height="50">
  <defs>
    <!-- pearl radial gradient — luminous white with warm pink/cream sheen -->
    <radialGradient id="pearl-lg" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#F8F4F0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#EDE4DF;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#E0D5CE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B1C9;stop-opacity:0.9" />
    </radialGradient>
    <radialGradient id="pearl-md" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F5F0EC;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#EAE0DA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D6CADD;stop-opacity:0.85" />
    </radialGradient>
    <radialGradient id="pearl-sm" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0EAE4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D6CADD;stop-opacity:0.8" />
    </radialGradient>
    <!-- pearl highlight — specular shine -->
    <radialGradient id="pearl-shine" cx="30%" cy="25%" r="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <!-- subtle drop shadow -->
    <filter id="pearl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#C4B1C9" flood-opacity="0.3" />
    </filter>
    <!-- line gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D6CADD;stop-opacity:0" />
      <stop offset="15%" style="stop-color:#D6CADD;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#C4B1C9;stop-opacity:0.7" />
      <stop offset="85%" style="stop-color:#D6CADD;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#D6CADD;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- thin line -->
  <line x1="50" y1="25" x2="550" y2="25" stroke="url(#line-grad)" stroke-width="1" />
  <!-- tiny accent pearl far left -->
  <circle cx="130" cy="25" r="3.5" fill="url(#pearl-sm)" opacity="0.8" filter="url(#pearl-shadow)" />
  <circle cx="130" cy="25" r="3.5" fill="url(#pearl-shine)" />
  <!-- small pearl left -->
  <circle cx="190" cy="25" r="7" fill="url(#pearl-md)" filter="url(#pearl-shadow)" />
  <circle cx="190" cy="25" r="7" fill="url(#pearl-shine)" />
  <!-- center pearl (larger) -->
  <circle cx="300" cy="25" r="12" fill="url(#pearl-lg)" filter="url(#pearl-shadow)" />
  <circle cx="300" cy="25" r="12" fill="url(#pearl-shine)" />
  <!-- small pearl right -->
  <circle cx="410" cy="25" r="7" fill="url(#pearl-md)" filter="url(#pearl-shadow)" />
  <circle cx="410" cy="25" r="7" fill="url(#pearl-shine)" />
  <!-- tiny accent pearl far right -->
  <circle cx="470" cy="25" r="3.5" fill="url(#pearl-sm)" opacity="0.8" filter="url(#pearl-shadow)" />
  <circle cx="470" cy="25" r="3.5" fill="url(#pearl-shine)" />
</svg>
