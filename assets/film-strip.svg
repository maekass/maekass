<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <linearGradient id="film-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8B4D9;stop-opacity:0.3" />
      <stop offset="15%" style="stop-color:#C8A8E9;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#B19CD9;stop-opacity:0.9" />
      <stop offset="85%" style="stop-color:#C8A8E9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#E8B4D9;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- top film rail -->
  <rect x="40" y="0" width="720" height="3" rx="1" fill="url(#film-grad)" />
  <!-- bottom film rail -->
  <rect x="40" y="57" width="720" height="3" rx="1" fill="url(#film-grad)" />
