<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <linearGradient id="film-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0C8C4;stop-opacity:0.3" />
      <stop offset="15%" style="stop-color:#C4B1C9;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#A899B0;stop-opacity:0.9" />
      <stop offset="85%" style="stop-color:#C4B1C9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#E0C8C4;stop-opacity:0.3" />
    </linearGradient>
    <!-- pearl for film strip corners -->
    <radialGradient id="fs-pearl" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F5F0EC;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#EDE4DF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D6CADD;stop-opacity:0.7" />
    </radialGradient>
    <radialGradient id="fs-shine" cx="30%" cy="25%" r="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- top film rail -->
  <rect x="40" y="0" width="720" height="3" rx="1" fill="url(#film-grad)" />
  <!-- bottom film rail -->
  <rect x="40" y="57" width="720" height="3" rx="1" fill="url(#film-grad)" />
  <!-- sprocket holes - top row -->
  <rect x="60" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="120" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="180" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="240" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="300" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="360" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="420" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="480" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="540" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="600" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="660" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="720" y="8" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <!-- sprocket holes - bottom row -->
  <rect x="60" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="120" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="180" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="240" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="300" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="360" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="420" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="480" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="540" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="600" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="660" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <rect x="720" y="44" width="12" height="8" rx="2" fill="none" stroke="#C4B1C9" stroke-width="1" opacity="0.6" />
  <!-- frame dividers -->
  <line x1="150" y1="3" x2="150" y2="57" stroke="#C4B1C9" stroke-width="0.5" opacity="0.4" />
  <line x1="270" y1="3" x2="270" y2="57" stroke="#C4B1C9" stroke-width="0.5" opacity="0.4" />
  <line x1="390" y1="3" x2="390" y2="57" stroke="#C4B1C9" stroke-width="0.5" opacity="0.4" />
  <line x1="510" y1="3" x2="510" y2="57" stroke="#C4B1C9" stroke-width="0.5" opacity="0.4" />
  <line x1="630" y1="3" x2="630" y2="57" stroke="#C4B1C9" stroke-width="0.5" opacity="0.4" />
  <!-- pearl accents at rail intersections -->
  <circle cx="150" cy="3" r="4" fill="url(#fs-pearl)" />
  <circle cx="150" cy="3" r="4" fill="url(#fs-shine)" />
  <circle cx="390" cy="3" r="4" fill="url(#fs-pearl)" />
  <circle cx="390" cy="3" r="4" fill="url(#fs-shine)" />
  <circle cx="630" cy="3" r="4" fill="url(#fs-pearl)" />
  <circle cx="630" cy="3" r="4" fill="url(#fs-shine)" />
  <circle cx="150" cy="57" r="4" fill="url(#fs-pearl)" />
  <circle cx="150" cy="57" r="4" fill="url(#fs-shine)" />
  <circle cx="390" cy="57" r="4" fill="url(#fs-pearl)" />
  <circle cx="390" cy="57" r="4" fill="url(#fs-shine)" />
  <circle cx="630" cy="57" r="4" fill="url(#fs-pearl)" />
  <circle cx="630" cy="57" r="4" fill="url(#fs-shine)" />
  <!-- subtle center text -->
  <text x="400" y="35" font-family="'Bodoni MT', Didot, Georgia, serif" font-size="11" fill="#C4B1C9" text-anchor="middle" opacity="0.5" letter-spacing="4">SELECTED WORK</text>
</svg>
